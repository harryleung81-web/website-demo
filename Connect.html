<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>parralign | Operational Clarity & Business Expertise</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="image/pf2.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          // Replace "YOUR_PUBLIC_KEY" with your actual key from the EmailJS Dashboard
          emailjs.init("YOUR_PUBLIC_KEY");
       })();
    </script>
</head>

<body>
<header class="sticky-nav">
    <div class="logo-container">
        <a href="index.html">
            <img src="image/ParralignTransP.png" alt="PARRALIGN Logo" class="nav-logo">
        </a>
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="Team.html">Meet The Team</a>
        <a href="#contact" class="btn-cta">Let's Connect</a>
    </div>

    <div class="nav-divider"></div>
</header>

<section id="contact">
    <div class="contact-bg-wrapper">
        <div class="container">
            <h2 class="section-title">Connect With Us</h2>
            <div class="contact-form-container">
                <form id="contactForm">
                    <div class="form-group">
                        <input type="text" name="from_name" placeholder="Full Name" required>
                        <input type="email" name="reply_to" placeholder="Email Address" required>
                    </div>
                    
                    <textarea name="message" rows="4" placeholder="How can we help you?" required></textarea>
                    
                    <button type="submit" id="submitBtn" class="btn-cta" style="border: none; cursor: pointer; width: 30%;">Submit</button>
                </form>
            </div>
        </div>
    </div>

    <div id="successModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon">✓</div>
            <h3>Message Sent</h3>
            <p>Thank you for reaching out to PARRALIGN. We will get back to you shortly.</p>
            <button type="button" onclick="closeSuccessModal()" class="btn-cta">Close</button>
        </div>
    </div>
</section>

<footer>
    <p>&copy; 2026 PARRALIGN. All rights reserved. | info@parralign.com</p>
</footer>

<script src="script.js"></script>

</body>
</html>
